<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project — Rodaina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="work">
  <div class="cursor" id="cursor" aria-hidden="true"><span class="cursor__label" id="cursorLabel"></span></div>
  <div class="transition" id="transition"><div class="transition__label" id="transitionLabel"></div></div>

  <div class="preloader" id="preloader">
    <div class="preloader__inner">
      <div class="preloader__count"><span id="preCount">0</span><span class="preloader__pct">%</span></div>
      <div class="preloader__name"><span>R</span><span>O</span><span>D</span><span>A</span><span>I</span><span>N</span><span>A</span></div>
      <div class="preloader__bar"><span id="preBar"></span></div>
    </div>
  </div>

  <header class="nav" id="nav">
    <a href="index.html" class="nav__brand" data-cursor="top" data-page="home">Rodaina<span class="nav__dot"></span></a>
    <nav class="nav__links">
      <a href="work.html" data-page="work">Work</a>
      <a href="about.html" data-page="about">About</a>
      <a href="contact.html" data-page="contact">Contact</a>
    </nav>
    <a href="contact.html" class="nav__status" data-cursor="say hi"><span class="nav__pulse"></span> Available for work</a>
  </header>

  <main class="page">
    <section class="page-hero" style="padding-bottom:0;">
      <span class="page-hero__index" id="pCat">Project</span>
      <h1 class="page-hero__title" id="pTitle" style="margin-top:10px;">Project</h1>
      <div class="page-hero__corner page-hero__corner--tr">© <span id="year1">2026</span></div>
      <div class="page-hero__corner page-hero__corner--br" id="clock">--:--:--</div>
    </section>

    <div class="project">
      <div class="project__hero" data-reveal>
        <div class="project__cover" id="pCover"></div>
        <div>
          <p class="project__summary" id="pSummary"></p>
          <div class="project__meta" id="pMeta"></div>
          <a class="project__cta" id="pCta" href="#" data-cursor="visit">View live project →</a>
        </div>
      </div>

      <div class="project__body">
        <p class="project__desc" id="pDesc" data-reveal></p>
        <div class="project__services" data-reveal>
          <h4>Services</h4>
          <ul id="pServices"></ul>
        </div>
      </div>

      <div class="project__gallery" id="pGallery" data-reveal></div>

      <div class="project__nav">
        <a class="pn-prev" id="pPrev" href="#" data-cursor="prev">
          <div class="pn-label" id="pPrevLabel">Previous</div>
          <div class="pn-title" id="pPrevTitle"></div>
        </a>
        <a class="pn-next" id="pNext" href="#" data-cursor="next">
          <div class="pn-label" id="pNextLabel">Next</div>
          <div class="pn-title" id="pNextTitle"></div>
        </a>
      </div>
    </div>
  </main>

  <footer class="footer">
    <span>© <span id="year2">2026</span> Rodaina — Graphic Designer</span>
    <span class="footer__mid">Built with care, deployed free on GitHub Pages.</span>
    <a href="index.html" data-cursor="top">Back to top ↑</a>
  </footer>

  <script src="vendor/gsap.min.js"></script>
  <script src="vendor/ScrollTrigger.min.js"></script>
  <script src="vendor/lenis.min.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/art.js"></script>
  <script src="js/site.js"></script>
  <script src="js/project.js"></script>
</body>
</html>
